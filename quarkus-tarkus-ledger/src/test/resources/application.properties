# Random port prevents TIME_WAIT conflicts when multiple @QuarkusTest classes restart Quarkus
quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ledgertest;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
# V1__initial_schema.sql (from quarkus-tarkus) and V100__ledger_schema.sql (from this module)
# are both on the classpath under db/migration/; Flyway picks up both automatically.
quarkus.flyway.locations=db/migration
quarkus.scheduler.enabled=false
quarkus.tarkus.default-expiry-hours=24
quarkus.tarkus.default-claim-hours=4
quarkus.tarkus.cleanup.expiry-check-seconds=60
quarkus.tarkus.ledger.enabled=true
quarkus.tarkus.ledger.hash-chain.enabled=true
quarkus.tarkus.ledger.decision-context.enabled=true
quarkus.tarkus.ledger.evidence.enabled=true
quarkus.tarkus.ledger.attestations.enabled=true
quarkus.tarkus.ledger.trust-score.enabled=true
