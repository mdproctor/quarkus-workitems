# H2 in-memory datasource for tarkus-flow integration tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tarkusflowtest;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.scheduler.enabled=false
quarkus.tarkus.default-expiry-hours=24
quarkus.tarkus.default-claim-hours=4
quarkus.tarkus.cleanup.expiry-check-seconds=60
